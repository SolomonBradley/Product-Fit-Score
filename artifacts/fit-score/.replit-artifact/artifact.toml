kind = "web"
previewPath = "/"
title = "AI Product Fit Score"
version = "1.0.0"
id = "artifacts/fit-score"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21165

[services.development]
run = "pnpm --filter @workspace/fit-score run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fit-score", "run", "build" ]
publicDir = "artifacts/fit-score/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21165"
BASE_PATH = "/"
